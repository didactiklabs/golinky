{{ define "main" }}
    <div class="card">
      <h2>All Links</h2>

      <div class="search-box">
        <form method="GET" action="/.search">
          <input type="text" name="q" placeholder="Search links..." class="input-full">
          <button type="submit" class="btn btn-primary">Search</button>
        </form>
      </div>

      <div style="margin-bottom: 1.5rem;">
        <a href="/.export" class="btn btn-secondary" download="golinky-export.json">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 0.5rem;">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Download all links in JSON Lines format
        </a>
      </div>

      {{if .}}
      <table class="links-table">
        <thead>
          <tr>
            <th>Short</th>
            <th>Destination</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody>
        {{range .}}
          <tr>
            <td>
              <a href="/{{.Short}}" class="link-short">{{.Short}}</a>
              <button class="copy-btn" onclick="copyLink(location.origin+'/{{.Short}}', this)" title="Copy link">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              </button>
              <a href="/.detail/{{.Short}}" class="link-edit-btn" title="Edit link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
              </a>
            </td>
            <td class="link-long">{{.Long}}</td>
            <td>{{.Created.Format "Jan 2, 2006"}}</td>
          </tr>
        {{end}}
        </tbody>
      </table>
      {{else}}
      <p class="empty-state">No links found.</p>
      {{end}}
    </div>

    <div style="text-align: center; margin-bottom: 2rem;">
      <a href="/" class="btn btn-primary">← Back to home</a>
    </div>
{{ end }}
