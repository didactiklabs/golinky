{{ define "main" }}
    <div class="card">
      <h2>Create a new link</h2>

      <form method="POST" action="/" class="link-form">
        <div class="form-group">
          <label for="short" class="input-prefix">http://{{go}}/</label>
          <input
            id="short"
            name="short"
            required
            type="text"
            placeholder="shortname"
            value="{{.Short}}"
            pattern="\w[\w\-\.]*"
            title="Must start with letter or number; may contain letters, numbers, dashes, and periods."
            class="input-with-prefix">
        </div>

        <div class="form-group">
          <span class="arrow">→</span>
        </div>

        <div class="form-group flex-grow">
          <input
            name="long"
            required
            type="text"
            placeholder="https://destination-url"
            {{if .Short}} value="{{.Long}}" autofocus{{end}}
            class="input-full">
        </div>

        <button type="submit" class="btn btn-primary">Create</button>
      </form>

      <div style="margin-top: 1.5rem; display: flex; gap: 1rem; flex-wrap: wrap;">
        <a href="/.all" class="btn btn-secondary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 0.5rem;">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          See all links
        </a>
        <a href="/.help" class="btn btn-secondary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 0.5rem;">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
          Help and advanced options
        </a>
      </div>
    </div>

    <div class="card">
      <h2>Popular Links</h2>
      {{if .Clicks}}
      <table class="links-table">
        <thead>
          <tr>
            <th>Link</th>
            <th>Clicks</th>
          </tr>
        </thead>
        <tbody>
        {{range .Clicks}}
          <tr>
            <td>
              <a href="/{{.Short}}" class="link-short">{{go}}/{{.Short}}</a>
              <a href="/.detail/{{.Short}}" class="link-edit-btn" title="Edit link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
              </a>
            </td>
            <td class="text-right">{{.NumClicks}}</td>
          </tr>
        {{end}}
        </tbody>
      </table>
      {{else}}
      <p class="empty-state">No links yet. Create your first link above!</p>
      {{end}}
    </div>
{{ end }}
