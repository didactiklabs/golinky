{{ define "main" }}
    <div class="card">
      <h2 class="success-title">✓ Link Created Successfully</h2>

      <p>Your link <a href="/{{.Short}}" class="link-highlight">{{go}}/{{.Short}}</a>
        <button class="copy-btn" style="opacity:1" onclick="copyLink(location.origin+'/{{.Short}}', this)" title="Copy link">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        </button>
        has been created!</p>

      <div class="button-group">
        <a href="/" class="btn btn-primary">Create Another</a>
        <a href="/.detail/{{.Short}}" class="btn btn-secondary">View Details</a>
      </div>
    </div>
{{ end }}
