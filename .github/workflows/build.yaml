name: GoReleaser Dry Run
on:
  pull_request:
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run GoReleaser (dry run)
        uses: goreleaser/goreleaser-action@v7
        with:
          args: release --snapshot # Perform a dry run
          version: "~> v2"
